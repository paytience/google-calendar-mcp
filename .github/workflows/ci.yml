name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build MCP server
        run: |
          npm ci
          npm run build

      - name: Typecheck web app
        run: |
          cd web
          npm ci
          npx tsc --noEmit
