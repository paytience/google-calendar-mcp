name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Build MCP server
        run: |
          npm ci
          npm run build

      - name: Test MCP server
        run: npm test

      - name: Lint MCP server
        run: npm run lint

      - name: Audit MCP server
        run: npm audit --audit-level=moderate

      - name: Typecheck web app
        run: |
          cd web
          npm ci
          npx tsc --noEmit

      - name: Lint web app
        run: |
          cd web
          npm run lint

      - name: Audit web app
        run: |
          cd web
          npm audit --audit-level=high
